# ============================================
# Configuration Nginx pour Aigle Royale
# Next.js Application
# ============================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=20r/s;

# Upstream Next.js backend
upstream nextjs_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Redirection HTTP vers HTTPS
server {
    listen 80;
    listen [::]:80;
    
    server_name travelia.afrika-connect.io;
    
    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    # Rediriger tout le reste vers HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Configuration HTTPS principale
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name travelia.afrika-connect.io;
    
    # Certificats SSL (configurés par Certbot)
    # ssl_certificate /etc/letsencrypt/live/travelia.afrika-connect.io/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/travelia.afrika-connect.io/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # Headers de sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Logs
    access_log /var/log/nginx/aigle-royale-access.log;
    error_log /var/log/nginx/aigle-royale-error.log warn;
    
    # Taille maximale des uploads (fichiers, images, etc.)
    client_max_body_size 10M;
    
    # Timeout configurations
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # Rate limiting général
    location / {
        limit_req zone=general_limit burst=50 nodelay;
        
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Headers standards
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Cache bypass
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Rate limiting strict pour l'authentification
    location /api/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;
        
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Rate limiting pour les APIs
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Assets statiques Next.js (optimisation cache)
    location /_next/static {
        proxy_pass http://nextjs_backend;
        proxy_cache_bypass $http_upgrade;
        
        # Cache agressif pour les assets statiques
        add_header Cache-Control "public, max-age=31536000, immutable";
        
        # Compression
        gzip on;
        gzip_vary on;
        gzip_types text/css application/javascript;
    }
    
    # Images Next.js
    location /_next/image {
        proxy_pass http://nextjs_backend;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=86400";
    }
    
    # Assets publics
    location /public/ {
        proxy_pass http://nextjs_backend;
        add_header Cache-Control "public, max-age=3600";
    }
    
    # Uploads
    location /uploads/ {
        proxy_pass http://nextjs_backend;
        add_header Cache-Control "public, max-age=86400";
    }
    
    # Healthcheck endpoint (optionnel)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
    
    # Bloquer l'accès aux fichiers sensibles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ /\.env {
        deny all;
        access_log off;
        log_not_found off;
    }
}
