# Dokploy / Nixpacks — Node 22 (Prisma 7 : 20.19+ ; Next 16 : 20.9+).
# Le plan Node par défaut utilise souvent Node 18, ce qui casse `npm ci` (preinstall Prisma).

[variables]
NIXPACKS_NODE_VERSION = "22"
# Ne pas fixer NODE_ENV=production ici : npm ci omettrait les devDependencies
# (dont le CLI `prisma`), le client ne serait pas généré et TS échouerait sur `Prisma`.

[phases.setup]
nixPkgs = ["nodejs_22", "npm-9_x", "openssl"]
